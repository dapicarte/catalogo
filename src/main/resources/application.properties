spring.application.name=catalogo
server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/catalogodb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Cambiar la ruta del JSON con la especificación OpenAPI (Por defecto: /v3/api-docs)
springdoc.api-docs.path=/api-docs

# Ordenar los endpoints alfabéticamente en la UI
springdoc.swagger-ui.operationsSorter=alpha

# HATEOAS - Desabilitar auto-configuración de HATEOAS en SpringDoc para evitar conflictos
springdoc.springdoc-hateoas-enabled=false